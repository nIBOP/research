# Настройки данных
data_path: ./           
dataset: clean_movies   
USER_ID_FIELD: user_id
ITEM_ID_FIELD: item_id
load_col:
    inter: [user_id, item_id, rating]

# Гиперпараметры кастомной модели (Адаптивной)
temperature: 0.2
proto_reg_weight: 0.05
centroids_path: 'cluster_centroids.pt'
item_mapping_path: 'clean_movies/clean_movies.item'
ema_momentum: 0.99
hit_quantile: 0.80
semantic_sampling: 'uniform'        # 'uniform' | 'batch'
alpha_strategy: 'dynamic_leaky_log' # 'dynamic_leaky_log' | 'inverse_log'
semantic_weight_floor: 0.05          # нижняя граница веса семантического лосса per item
semantic_weight_cap: 0.1             # верхняя граница веса семантического лосса per item
semantic_margin: 0.8                 # зона терпимости (косинусное сходство), после которой притяжение отключается
# Deprecated aliases (still supported in code): alpha_min, alpha_max
dynamic_cutoff_quantile: 0.85

# Настройки обучения
seed: 42
epochs: 300               
train_batch_size: 2048
learner: adam
learning_rate: 0.001
eval_step: 1
stopping_step: 10

# Настройки оценки
eval_args:
    split: {'RS': [0.8, 0.1, 0.1]}
    group_by: user
    order: RO
    mode: full
metrics: ['Recall', 'NDCG']
topk: [10, 50]
valid_metric: NDCG@10

# System
use_tensorboard: False
gpu_id: 0